site_name: FMU-API
site_description: Бесплатная реализация Frontol Mark Unit для работы с маркировкой
site_url: https://shrayky.github.io/FMU-API/
repo_url: https://github.com/shrayky/FMU-API
repo_name: shrayky/FMU-API

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Переключить на темную тему
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Переключить на светную тему
  features:
    - navigation.tabs        # Вкладки сверху
    - navigation.tabs.sticky # Закрепить вкладки при прокрутке
    - navigation.sections    # Секции в навигации
    - search.highlight
    - content.code.copy
    - navigation.top         # Кнопка "наверх"
    - header.autohide        # Скрывать шапку при прокрутке

plugins:
  - search:
      lang: ru

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# Структура навигации - только верхние вкладки
nav:
  - Главная: index.md
  - Документация:
    - Быстрый старт: docs/quickstart.md
    - Установка: docs/installation.md
    - Настройка Frontol: docs/frontol-integration.md
    - API Reference: docs/api.md
  - Релизы:
    - История версий: releases/changelog.md
    - Версия 1.0.0: releases/v1.0.0.md
    - Версия 0.9.0: releases/v0.9.0.md
  - GitHub: https://github.com/shrayky/FMU-API
